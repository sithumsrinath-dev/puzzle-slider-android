name: Ultimate Android Build (Keep-Alive Mode)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120 # පැය 2ක් යනකම් සර්වර් එකට මැරෙන්න දෙන්නේ නැහැ

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libsqlite3-dev libgdbm-dev libssl-dev libbz2-dev libffi-dev ccache
          pip3 install --user --upgrade "buildozer>=1.5.0" cython virtualenv

      - name: Build APK with Keep-Alive Signal
        run: |
          export PATH=$PATH:~/.local/bin
          
          # සර්වර් එක බලෙන්ම ඔන් කර තැබීමේ පසුබිම් ක්‍රියාවලිය (අත දාලා අල්ලන් ඉන්නවා වගේ වැඩක්!)
          bash -c 'while true; do echo "⏳ [Keep-Alive] සර්වර් එක සක්‍රීයයි... බිල්ඩ් එක සිදුවෙමින් පවතිනවා..."; sleep 30; done' &
          KEEP_ALIVE_PID=$!
          
          # නිල වශයෙන් බිල්ඩ් එක පටන් ගැනීම
          yes | buildozer -v android release
          
          # බිල්ඩ් එක ඉවර වුණාම සර්වර් එක රවට්ටන එක නතර කිරීම
          kill $KEEP_ALIVE_PID
        continue-on-error: false

      - name: Auto-Sign All Created Files
        run: |
          keytool -genkey -v -keystore release.keystore -alias puzzle_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass silentpuzzle123 -keypass silentpuzzle123 -dname "CN=SilentThoughts, O=App, L=Colombo, C=LK"
          if [ -d bin ]; then
            for file in bin/*; do
              jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 -keystore release.keystore -storepass silentpuzzle123 "$file" puzzle_alias
            done
          fi

      - name: Upload Signed APK / AAB
        uses: actions/upload-artifact@v4
        with:
          name: Ultimate-Sliding-Puzzle-Final-App
          path: bin/*
