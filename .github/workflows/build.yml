name: Build Puzzle Slider AAB

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          ccache \
          git \
          libffi-dev \
          libssl-dev \
          libgtk-3-dev \
          zlib1g-dev \
          unzip \
          zip \
          autoconf \
          automake \
          libtool \
          libtool-bin \
          gettext \
          pkg-config \
          cmake \
          ninja-build \
          patch

    - name: Install Python Build Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install --upgrade cython virtualenv buildozer kivy

    - name: Generate Valid Buildozer Spec
      run: |
        rm -f buildozer.spec
        buildozer init
        python3 -c "
        import configparser

        config = configparser.ConfigParser(interpolation=None)
        config.read('buildozer.spec')

        if 'app' in config:
            config['app']['title'] = 'Sliding Puzzle Ultimate'
            config['app']['package.name'] = 'puzzleslider'
            config['app']['package.domain'] = 'org.senu'
            config['app']['source.include_exts'] = 'py,png,jpg,kv,atlas'
            config['app']['version'] = '1.0'
            config['app']['requirements'] = 'python3,kivy'
            config['app']['orientation'] = 'portrait'
            config['app']['presplash.filename'] = '%(source.dir)s/presplash.jpg'
            config['app']['icon.filename'] = '%(source.dir)s/icon.png'
            config['app']['android.accept_sdk_license'] = 'True'
            config['app']['fullscreen'] = '1'

        with open('buildozer.spec', 'w') as f:
            config.write(f)
        "

    - name: Build Android App Bundle (AAB) with Buildozer
      run: |
        unset ANDROID_SDK_ROOT
        unset ANDROID_HOME
        unset ANDROID_NDK
        unset ANDROID_NDK_LATEST_HOME
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_ROOT
        
        export HOME=/home/runner
        export BUILDOZER_ALLOW_ORG_TEST_DOMAIN=1
        buildozer android release

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-aab
        path: bin/*.aab
