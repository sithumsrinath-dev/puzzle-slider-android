name: Production Android Build (Anti-Timeout Edition)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libunwind-dev \
          build-essential ccache git libffi-dev libssl-dev \
          libltdl-dev libgstreamer1.0-dev gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
          gstreamer1.0-plugins-ugly gstreamer1.0-libav \
          libgstreamer-plugins-base1.0-dev unzip zip openjdk-17-jdk \
          autoconf libtool pkg-config zlib1g-dev python3-setuptools \
          python3-pip python3-dev libncurses5-dev libsqlite3-dev libgdbm-dev libbz2-dev \
          libjpeg-dev zlib1g-dev appstream autotools-dev

    - name: Build Android App inside Virtual Environment
      run: |
        python -m venv venv
        source venv/bin/activate
        
        pip install --upgrade pip
        pip install --upgrade Cython==3.0.10 "buildozer>=1.5.0" virtualenv setuptools wheel
        
        # GitHub SDK එක සම්බන්ධ කිරීම
        mkdir -p ~/.buildozer/android/platform/
        ln -s $ANDROID_HOME_ROOT ~/.buildozer/android/platform/android-sdk
        
        export ANDROID_HOME=$ANDROID_HOME_ROOT
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
        
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        yes | sdkmanager --licenses || true
        
        # Architecture එක 64-bit වලට සීමා කිරීම
        sed -i 's/android.archs = .*/android.archs = arm64-v8a/g' buildozer.spec
        
        # 👑 [ANTI-TIMEOUT KEEP-ALIVE] 👑
        # GitHub සර්වර් එකට පේළි වැසුනත්, පසුබිමෙන් සෑම තත්පර 30කට වරක්ම පණිවිඩයක් ප්‍රින්ට් කර 
        # සර්වර් එක Timeout වී ක්‍රෑෂ් වීම වළක්වන ආරක්ෂිත පද්ධතියක් සක්‍ရීය කිරීම.
        (while true; do echo "⏳ [Keep-Alive] බිල්ඩ් එක තවමත් පසුබිමෙන් සිදුවෙමින් පවතිනවා... කරුණාකර රැඳී සිටින්න..."; sleep 30; done) &
        LOG_PID=$!
        
        # පළමුව Play Store සඳහා .aab එක නිපදවීම
        sed -i 's/android.release_artifact = apk/android.release_artifact = aab/g' buildozer.spec
        yes | buildozer android release
        
        # දෙවනුව ජංගම දුරකථනයට දැමීමට .apk එක නිපදවීම
        sed -i 's/android.release_artifact = aab/android.release_artifact = apk/g' buildozer.spec
        yes | buildozer android debug
        
        # බිල්ඩ් එක ඉවර වූ පසු පසුබිම් පණිවිඩ පද්ධතිය නතර කිරීම
        kill $LOG_PID
        
      continue-on-error: false

    - name: Upload Production AAB (For Google Play Store)
      uses: actions/upload-artifact@v4
      with:
        name: Play-Store-Production-Bundle-AAB
        path: bin/*.aab

    - name: Upload Testing APK (For your Mobile Phone)
      uses: actions/upload-artifact@v4
      with:
        name: Testing-App-APK
        path: bin/*.apk
