name: Build Android App with Buildozer

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ccache git libffi-dev libssl-dev \
            autoconf automake libtool patch pkg-config zlib1g-dev \
            libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            libsqlite3-dev sqlite3 bzip2 libbz2-dev liblzma-dev \
            libreadline-dev libgdbm-dev libdb5.3-dev libpcap-dev unzip openjdk-17-jdk \
            gettext autopoint m4 libtool-bin

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==3.0.10 kivy

      - name: Fix Autoconf Macro Paths (THE ULTIMATE FIX)
        # Buildozer а¶‘а¶ҡ а¶…а¶ҙа·ҡ а¶ҙа¶»а·’а·ға¶» а·Җа·’а¶ а¶Ҫа·ҠвҖҚа¶әа¶әа¶ұа·Ҡ а¶ёа·җа¶ҡа·”а·Җа¶ӯа·Ҡ а¶ҡа·ҠвҖҚа¶»а·‘а·Ӯа·Ҡ а¶ұа·ңа·Җа·“а¶ёа¶§, а¶ёа·җа¶ҡа·ҠвҖҚа¶»а·қа·ға·Ҡ а¶ңа·ңа¶ұа·” а¶ңа·қа¶Ҫа·“а¶ә а·Ҷа·қа¶Ҫа·Ҡа¶©а¶»а¶әа¶§а¶ё а¶ҡа·ңа¶ҙа·’ а¶ҡа·’а¶»а·“а¶ё
        run: |
          sudo cp /usr/share/aclocal/libtool.m4 /usr/share/autoconf/autoconf/ || true
          sudo cp /usr/share/aclocal/ltoptions.m4 /usr/share/autoconf/autoconf/ || true
          sudo cp /usr/share/aclocal/ltsugar.m4 /usr/share/autoconf/autoconf/ || true
          sudo cp /usr/share/aclocal/ltversion.m4 /usr/share/autoconf/autoconf/ || true
          sudo cp /usr/share/aclocal/lt~obsolete.m4 /usr/share/autoconf/autoconf/ || true

      - name: Fix Android SDK Layout for Buildozer
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
          
          # Buildozer а·ға¶іа·„а·Ҹ а¶…а·Җа·Ға·ҠвҖҚа¶ә а·Җа·ҠвҖҚа¶әа·”а·„а¶ә а·ға¶ҡа·ға·Ҡ а¶ҡа·’а¶»а·“а¶ё
          mkdir -p /usr/local/lib/android/sdk/tools/bin
          if [ -f "/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager" ]; then
            ln -sf /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager /usr/local/lib/android/sdk/tools/bin/sdkmanager
          elif [ -f "/usr/local/lib/android/sdk/cmdline-tools/11.0/bin/sdkmanager" ]; then
            ln -sf /usr/local/lib/android/sdk/cmdline-tools/11.0/bin/sdkmanager /usr/local/lib/android/sdk/tools/bin/sdkmanager
          fi
          
          yes | /usr/local/lib/android/sdk/tools/bin/sdkmanager --licenses || true

      - name: Build Android App Bundle (Release AAB)
        run: |
          buildozer android release

      - name: Upload Production Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sliding-puzzle-release-aab
          path: bin/*.aab
