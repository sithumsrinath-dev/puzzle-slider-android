name: Live Debugging Workflow

on:
  workflow_dispatch:

jobs:
  live_debug:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Run Buildozer Directly to Catch the Real Error
      run: |
        sudo chown -R 1000:1000 ${{ github.workspace }}
        sudo chmod -R 777 ${{ github.workspace }}
        
        echo "=== STARTING DOCKER BUILDOZER ==="
        docker run --rm \
          -v ${{ github.workspace }}:/home/user/hostcvs \
          -e BUILDOZER_ALLOW_ORG_BUILD=1 \
          kivy/buildozer:latest \
          bash -c "cd /home/user/hostcvs && buildozer android release"
