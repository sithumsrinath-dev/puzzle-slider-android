name: Production Android Build (Keep-Alive & Export Grade)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04  # අලුත්ම සහ ස්ථාවරම පද්ධතිය
    timeout-minutes: 120   # පැය 2ක් යනකම් සර්වර් එකට මැරෙන්න දෙන්නේ නැහැ

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential ccache git libffi-dev libssl-dev \
          libltdl-dev libgstreamer1.0-dev gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
          gstreamer1.0-plugins-ugly gstreamer1.0-libav gstreamer1.0-doc \
          libgstreamer-plugins-base1.0-dev unzip zip openjdk-17-jdk \
          autoconf libtool pkg-config zlib1g-dev python3-setuptools \
          python3-pip python3-dev libncurses5-dev libsqlite3-dev libgdbm-dev libbz2-dev

    - name: Install Python Build Tools
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade Cython==3.0.10 "buildozer>=1.5.0" virtualenv

    - name: Build Android Artifacts with Keep-Alive Signal
      run: |
        # 1. සර්වර් එක නොනවත්වා ක්‍රියාත්මක කර තැබීමේ පසුබිම් සංඥාව (Keep-Alive)
        bash -c 'while true; do echo "⏳ [Keep-Alive] සර්වර් එක සක්‍රීයයි... බිල්ඩ් එක සිදුවෙමින් පවතිනවා..."; sleep 30; done' &
        KEEP_ALIVE_PID=$!
        
        # 2. ප්‍රථමයෙන් Play Store සඳහා .aab (App Bundle) එක බිල්ඩ් කිරීම
        sed -i 's/android.release_artifact = apk/android.release_artifact = aab/g' buildozer.spec
        yes | buildozer android release
        
        # 3. ඊළඟට ඔයාට ටෙස්ට් කරලා බලන්න .apk එකක් බිල්ඩ් කිරීම
        sed -i 's/android.release_artifact = aab/android.release_artifact = apk/g' buildozer.spec
        yes | buildozer android debug
        
        # 4. බිල්ඩ් එක අවසන් වූ පසු Keep-Alive ක්‍රියාවලිය නතර කිරීම
        kill $KEEP_ALIVE_PID
      continue-on-error: false

    - name: Upload Production AAB (For Google Play Store)
      uses: actions/upload-artifact@v4
      with:
        name: Play-Store-Production-Bundle-AAB
        path: .buildozer/android/platform/build-arm64-v8a_armeabi-v7a/dists/*/*.aab

    - name: Upload Testing APK (For your Mobile Phone)
      uses: actions/upload-artifact@v4
      with:
        name: Testing-App-APK
        path: bin/*.apk
    
