name: Build Android App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix Directory Permissions for Buildozer User
        run: |
          sudo chown -R 1000:1000 ${{ github.workspace }}

      - name: Run Buildozer inside Isolated Container
        run: |
          docker run --rm \
            --user 1000:1000 \
            -v ${{ github.workspace }}:/home/user/hostdir \
            ghcr.io/kivy/buildozer:latest \
            android release

      - name: Reset Permissions for Artifact Upload
        if: always()
        run: |
          sudo chown -R runner:docker ${{ github.workspace }}

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: puzzle-slider-release
          path: bin/*.aab

      - name: Setup Interactive Live Debug Session on Failure
        if: failure()
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: false
