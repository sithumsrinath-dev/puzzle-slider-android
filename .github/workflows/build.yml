name: Production Android Build (Strict Silent License Fix)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libunwind-dev \
          build-essential ccache git libffi-dev libssl-dev \
          libltdl-dev libgstreamer1.0-dev gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
          gstreamer1.0-plugins-ugly gstreamer1.0-libav \
          libgstreamer-plugins-base1.0-dev unzip zip openjdk-17-jdk \
          autoconf libtool pkg-config zlib1g-dev python3-setuptools \
          python3-pip python3-dev libncurses5-dev libsqlite3-dev libgdbm-dev libbz2-dev \
          libjpeg-dev zlib1g-dev appstream autotools-dev

    - name: Build Android App inside Virtual Environment
      run: |
        python -m venv venv
        source venv/bin/activate
        
        pip install --upgrade pip
        pip install --upgrade Cython==3.0.10 "buildozer>=1.5.0" virtualenv setuptools wheel
        
        # GitHub නිල Android SDK පථය සෘජුවම ලබාදීම
        export ANDROID_HOME=/usr/local/lib/android/sdk
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/tools/bin:$PATH
        
        # Buildozer සඳහා SDK එක Link කිරීම
        mkdir -p ~/.buildozer/android/platform/
        rm -rf ~/.buildozer/android/platform/android-sdk || true
        ln -s $ANDROID_HOME ~/.buildozer/android/platform/android-sdk
        
        # 👑 [CRITICAL LICENSE FIX - NO MORE BROKEN PIPES] 👑
        # ලයිසන් ලොකු ගොනු විදියට Terminal එකට පනින එක වැළැක්වීමට,
        # අපි සියලුම ලයිසන් 'සයිලන්ට්' (Silent) ක්‍රමයට පිළිගන්නා ලෙස විධානය සකසා ඇත.
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
        echo "⏳ Android Licenses නිශ්ශබ්දව පිළිගනිමින් පවතිනවා..."
        touch license_out.txt
        yes 2>/dev/null | sdkmanager --licenses > license_out.txt 2>&1 || true
        
        # Architecture එක 64-bit වලට සීමා කිරීම
        sed -i 's/android.archs = .*/android.archs = arm64-v8a/g' buildozer.spec
        
        # 👑 [FIXED - STABLE LOG REDIRECTION] 👑
        # බිල්ඩ් එක අතරතුර ප්‍රශ්නයක් නොවීමට build_log.txt නිවැරදිව නිර්මාණය කිරීම
        touch build_log.txt
        
        echo "🚀 Play Store සඳහා .aab බිල්ඩ් එක ආරම්භ වුණා..."
        sed -i 's/android.release_artifact = apk/android.release_artifact = aab/g' buildozer.spec
        buildozer android release > build_log.txt 2>&1
        
        echo "🚀 ෆෝන් එක සඳහා .apk බිල්ඩ් එක ආරම්භ වුණා..."
        sed -i 's/android.release_artifact = aab/android.release_artifact = apk/g' buildozer.spec
        buildozer android debug >> build_log.txt 2>&1
        
        echo "✅ බිල්ඩ් පියවර සාර්ථකව අවසන්!"
      continue-on-error: false

    - name: Upload Production AAB (For Google Play Store)
      uses: actions/upload-artifact@v4
      with:
        name: Play-Store-Production-Bundle-AAB
        path: bin/*.aab

    - name: Upload Testing APK (For your Mobile Phone)
      uses: actions/upload-artifact@v4
      with:
        name: Testing-App-APK
        path: bin/*.apk

    - name: Upload Build Logs (If anything goes wrong)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Build-Full-Terminal-Logs
        path: |
          build_log.txt
          license_out.txt
