name: Build Puzzle Slider AAB

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Fix Workspace Permissions for Docker Context
      run: |
        sudo chown -R 1000:1000 ${{ github.workspace }}
        sudo chmod -R 777 ${{ github.workspace }}

    - name: Build Android Release AAB inside Stable Kivy Container
      uses: addnab/docker-run-action@v3
      with:
        image: kivy/buildozer:latest
        options: |
          -v ${{ github.workspace }}:/home/user/hostcvs
          -v /home/runner/.buildozer:/home/user/.buildozer
          --network host
        run: |
          cd /home/user/hostcvs
          
          # Force create Android SDK configuration folders for both environments
          mkdir -p /home/user/.buildozer/android/platform/android-sdk/licenses
          mkdir -p /root/.buildozer/android/platform/android-sdk/licenses
          
          # Inject pre-accepted Android SDK licenses to bypass interactive prompt (y/N)
          echo -e "893547e6b492b10e2ea34726a995d8e63b61434d\nd56f5187479451eabf01fb7431302458d34d7756\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > /home/user/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "893547e6b492b10e2ea34726a995d8e63b61434d\nd56f5187479451eabf01fb7431302458d34d7756\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > /root/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          
          # Dynamically execute sdkmanager licenses acceptance if binary paths exist
          if [ -d "/home/user/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin" ]; then
            yes | /home/user/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
          fi
          if [ -d "/root/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin" ]; then
            yes | /root/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
          fi
          
          export BUILDOZER_ALLOW_ORG_BUILD=1
          buildozer android release

    - name: Restore Runner Workspace Ownership
      if: always()
      run: |
        sudo chown -R runner:docker ${{ github.workspace }}

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-aab
        path: bin/*.aab
