name: Build Puzzle Slider AAB

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Fix Workspace Permissions for Docker Context
      run: |
        sudo chown -R 1000:1000 ${{ github.workspace }}
        sudo chmod -R 777 ${{ github.workspace }}

    - name: Build Android Release AAB inside Stable Kivy Container
      uses: addnab/docker-run-action@v3
      with:
        image: kivy/buildozer:latest
        options: |
          -v ${{ github.workspace }}:/home/user/hostcvs
          -v /home/runner/.buildozer:/home/user/.buildozer
          --network host
        run: |
          cd /home/user/hostcvs
          
          # 1. Explicitly create the required rigid nested structures for both users
          mkdir -p /home/user/.buildozer/android/platform/android-sdk/cmdline-tools/latest
          mkdir -p /root/.buildozer/android/platform/android-sdk/cmdline-tools/latest
          mkdir -p /home/user/.buildozer/android/platform/android-sdk/licenses
          mkdir -p /root/.buildozer/android/platform/android-sdk/licenses
          
          # 2. Download exact version of Android Command Line Tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O /tmp/cmdline-tools.zip
          
          # 3. Unzip into a temporary staging location
          mkdir -p /tmp/cmdline-raw
          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-raw
          
          # 4. Correct the hierarchy flaw by shifting raw files straight inside 'latest' folder directly
          cp -r /tmp/cmdline-raw/cmdline-tools/* /home/user/.buildozer/android/platform/android-sdk/cmdline-tools/latest/
          cp -r /tmp/cmdline-raw/cmdline-tools/* /root/.buildozer/android/platform/android-sdk/cmdline-tools/latest/
          
          # 5. Populate standard build licenses strings to terminate interactive blocks
          LICENSE_HASHES="893547e6b492b10e2ea34726a995d8e63b61434d\nd56f5187479451eabf01fb7431302458d34d7756\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n84831b9409646a918e30573bab4c9c91346d8abd"
          echo -e "$LICENSE_HASHES" > /home/user/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "$LICENSE_HASHES" > /root/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          
          # 6. Force verify licenses via absolute SDK roots execution paths
          yes | /home/user/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=/home/user/.buildozer/android/platform/android-sdk --licenses || true
          yes | /root/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=/root/.buildozer/android/platform/android-sdk --licenses || true
          
          # 7. Execute fully unblocked deployment compilation
          export BUILDOZER_ALLOW_ORG_BUILD=1
          buildozer android release

    - name: Restore Runner Workspace Ownership
      if: always()
      run: |
        sudo chown -R runner:docker ${{ github.workspace }}

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-aab
        path: bin/*.aab
