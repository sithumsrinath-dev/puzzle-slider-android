name: Build Android App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-x64: true
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ccache \
            git \
            libffi-dev \
            libssl-dev \
            libltdl-dev \
            openjdk-17-jdk \
            patch \
            unzip \
            zlib1g-dev \
            zip \
            autoconf \
            automake \
            libtool \
            pkg-config \
            cmake \
            ninja-build

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip setuptools virtualenv Cython==3.0.11
          pip install git+https://github.com/kivy/buildozer.git@master

      - name: Build with Buildozer
        run: |
          buildozer android release

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: puzzle-slider-release
          path: bin/*.aab
