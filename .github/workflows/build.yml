name: Build Android App with Buildozer Docker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache Buildozer Global Directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Create Local Buildozer Cache Directory
        run: |
          mkdir -p .buildozer-global
          chmod -R 777 .buildozer-global

      - name: Build Android App Bundle (STABLE ROOT MODE)
        # මෙහි Cache එක /root/.buildozer වෙත ලබා දී ඇත. 
        run: |
          docker run --rm \
            --entrypoint "" \
            -w /home/user/hostdir \
            -v ${{ github.workspace }}:/home/user/hostdir \
            -v ${{ github.workspace }}/.buildozer-global:/root/.buildozer \
            kivy/buildozer:latest \
            /bin/bash -c "yes y | buildozer android release"

      - name: Fix Workspace Permissions for GitHub Actions Artifacts
        if: always()
        run: |
          sudo chown -R $USER:$USER ${{ github.workspace }}
          sudo chown -R $USER:$USER ${{ github.workspace }}/.buildozer-global || true

      - name: Upload Production Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ultimate-sliding-puzzle-release
          path: bin/*.aab
