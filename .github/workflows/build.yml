name: Build Android App with Buildozer

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ccache git libffi-dev libssl-dev \
            autoconf automake libtool pkg-config zlib1g-dev \
            libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            libsqlite3-dev sqlite3 bzip2 libbz2-dev liblzma-dev \
            libreadline-dev libgdbm-dev libdb5.3-dev libpcap-dev unzip

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==3.0.10 kivy

      - name: Set up Android SDK & NDK Environment
        run: |
          echo "android.sdk_path = /usr/local/lib/android/sdk" >> buildozer.spec

      - name: Build Android App Bundle (Release AAB)
        run: |
          # Play Store එකට දැමීමට release ආකාරයෙන් build කරනු ලැබේ
          buildozer android release

      - name: Upload Production Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sliding-puzzle-release-aab
          path: bin/*.aab
