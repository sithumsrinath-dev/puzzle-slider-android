name: Production Android Build (Ultimate License Injector)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libunwind-dev \
          build-essential ccache git libffi-dev libssl-dev \
          libltdl-dev libgstreamer1.0-dev gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
          gstreamer1.0-plugins-ugly gstreamer1.0-libav \
          libgstreamer-plugins-base1.0-dev unzip zip openjdk-17-jdk \
          autoconf libtool pkg-config zlib1g-dev python3-setuptools \
          python3-pip python3-dev libncurses5-dev libsqlite3-dev libgdbm-dev libbz2-dev \
          libjpeg-dev zlib1g-dev appstream autotools-dev

    - name: Build Android App inside Virtual Environment
      run: |
        python -m venv venv
        source venv/bin/activate
        
        pip install --upgrade pip
        pip install --upgrade Cython==3.0.10 "buildozer>=1.5.0" virtualenv setuptools wheel
        
        # 👑 [එක්සිට් කෝඩ් 1 සඳහා වන අවසන් මහා විසඳුම - LICENSE INJECTION] 👑
        # Buildozer එක විසින් අනාගතයේදී සාදන සියලුම SDK පථ කලින්ම නිර්මාණය කිරීම
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        
        # Google සමාගමේ නිල ලයිසන් කේතයන් (Hashes) කෙලින්ම Buildozer SDK එක ඇතුළට ලිවීම.
        # මෙයින් බිල්ඩ් එක අතරතුර Buildozer එකට කිසිදු ලයිසන් ප්‍රශ්නයක් ඇසීමට නොහැකි වන සේ වසා දමයි!
        echo -e "\n8933bad161ad4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb74313026e2281db3b1\n26466f859b3d67422608aed8e42e771469e46129\n27444d5e98ccac854336c3444b25166164a6b320" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "\n84831b9409646a547e30e308b27748e3644a8359\n96462b0474b90a8c17c1778d099310116d22a55c" > ~/.buildozer/android/platform/android-sdk/licenses/android-googletv-license
        echo -e "\n33b6a2b64bcbee1d2d1ff2453e122d647e19308d" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
        echo -e "\ne9ac30d073106fab8e7c4c34d2673a6a6673422e" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-arm-dbt-license
        echo -e "\n6072092b530cdaa6bc383c317aa0de11f14ec236" > ~/.buildozer/android/platform/android-sdk/licenses/glass-license
        echo -e "\ngarmin-mfa-2020-license" > ~/.buildozer/android/platform/android-sdk/licenses/mips-android-sysimage-license
        
        # පද්ධතියේ (Global) ඇති ලයිසන් ද පිළිගෙන තැබීම
        export ANDROID_HOME=$ANDROID_HOME_ROOT
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
        yes | sdkmanager --licenses || true
        
        # පැරණි කැඩුණු ලොග් හෝ Cache ඇත්නම් ඒවා පිරිසිදු කිරීම
        buildozer android clean || true
        
        # 🚀 නිල වශයෙන් .aab සහ .apk බිල්ඩ් කිරීම අරඹන්න
        sed -i 's/android.release_artifact = apk/android.release_artifact = aab/g' buildozer.spec
        buildozer android release
        
        sed -i 's/android.release_artifact = aab/android.release_artifact = apk/g' buildozer.spec
        buildozer android debug
        
      continue-on-error: false

    - name: Upload Production AAB (For Google Play Store)
      uses: actions/upload-artifact@v4
      with:
        name: Play-Store-Production-Bundle-AAB
        path: bin/*.aab

    - name: Upload Testing APK (For your Mobile Phone)
      uses: actions/upload-artifact@v4
      with:
        name: Testing-App-APK
        path: bin/*.apk
