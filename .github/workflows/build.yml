name: Build Android App Natively

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    # මෙතැනින් තමයි ගැටලුව ස්ථිරවම විසඳුවේ (ubuntu-latest වෙනුවට ubuntu-22.04 භාවිතය)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11 (Stable for Buildozer)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies for Android Build
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev openjdk-17-jdk

      - name: Install Buildozer and Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.33 virtualenv

      - name: Build Android Release (AAB)
        run: |
          buildozer android release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: bin/*.aab
