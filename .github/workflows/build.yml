name: Build Puzzle Slider AAB

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          ccache \
          git \
          libffi-dev \
          libssl-dev \
          libgtk-3-dev \
          zlib1g-dev \
          unzip \
          zip \
          autoconf \
          automake \
          libtool \
          libtool-bin \
          gettext \
          pkg-config \
          cmake \
          ninja-build \
          patch

    - name: Install Python Build Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install --upgrade cython virtualenv buildozer kivy

    - name: Generate Valid Buildozer Spec
      run: |
        rm -f buildozer.spec
        buildozer init
        
        # Safely update buildozer.spec using Regex without breaking Kivy/Buildozer variables
        python3 -c "
        import re

        with open('buildozer.spec', 'r') as f:
            content = f.read()

        parts = content.split('[buildozer]')
        app_sec = parts[0]
        buildozer_sec = '[buildozer]' + parts[1] if len(parts) > 1 else ''

        replacements = {
            r'^[# ]*title\s*=.*': 'title = Sliding Puzzle Ultimate',
            r'^[# ]*package\.name\s*=.*': 'package.name = puzzleslider',
            r'^[# ]*package\.domain\s*=.*': 'package.domain = org.senu',
            r'^[# ]*source\.include_exts\s*=.*': 'source.include_exts = py,png,jpg,kv,atlas',
            r'^[# ]*version\s*=.*': 'version = 1.0',
            r'^[# ]*requirements\s*=.*': 'requirements = python3,kivy,kivmob,android',
            r'^[# ]*orientation\s*=.*': 'orientation = portrait',
            r'^[# ]*presplash\.filename\s*=.*': r'presplash.filename = %(source.dir)s/presplash.jpg',
            r'^[# ]*icon\.filename\s*=.*': r'icon.filename = %(source.dir)s/icon.png',
            r'^[# ]*android\.accept_sdk_license\s*=.*': 'android.accept_sdk_license = True',
            r'^[# ]*fullscreen\s*=.*': 'fullscreen = 0',
            r'^[# ]*android\.api\s*=.*': 'android.api = 35',
            r'^[# ]*android\.minapi\s*=.*': 'android.minapi = 21',
            r'^[# ]*android\.sdk\s*=.*': 'android.sdk = 35',
            r'^[# ]*android\.ndk\s*=.*': 'android.ndk = 25b',
            r'^[# ]*android\.archs\s*=.*': 'android.archs = arm64-v8a, armeabi-v7a, x86, x86_64',
            r'^[# ]*p4a\.bootstrap\s*=.*': 'p4a.bootstrap = sdl2',
            r'^[# ]*android\.gradle_dependencies\s*=.*': 'android.add_gradle_dependencies = com.google.android.gms:play-services-ads:22.6.0',
            r'^[# ]*android\.meta_data\s*=.*': 'android.meta_data = com.google.android.gms.ads.APPLICATION_ID=ca-app-pub-5106431642894326~3643301881'
        }

        for pattern, repl in replacements.items():
            app_sec = re.sub(pattern, repl, app_sec, flags=re.MULTILINE)

        with open('buildozer.spec', 'w') as f:
            f.write(app_sec + buildozer_sec)
        "

    - name: Build Android App Bundle (AAB) with Buildozer
      run: |
        unset ANDROID_SDK_ROOT
        unset ANDROID_HOME
        unset ANDROID_NDK
        unset ANDROID_NDK_LATEST_HOME
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_ROOT
        
        export HOME=/home/runner
        export BUILDOZER_ALLOW_ORG_TEST_DOMAIN=1
        buildozer android release

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-aab
        path: bin/*.aab
