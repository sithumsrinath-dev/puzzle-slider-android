name: Build Android App with Buildozer Docker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache Buildozer Global Directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Build Android App Bundle via Docker (AUTOMATED ROOT BYPASS)
        # 'yes |' මඟින් Buildozer අසන සියලුම Interactive ප්‍රශ්න වලට ස්වයංක්‍රීයව 'y' පිළිතුර ලබා දෙයි.
        # තවද, Play Store (2026) සඳහා අවශ්‍ය Android SDK බලපත්‍ර (Licenses) ද මෙහිදීම ස්වයංක්‍රීයව පිළිගනු ලබයි.
        run: |
          yes | docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostdir \
            -v ~/.buildozer:/home/user/.buildozer \
            kivy/buildozer:latest \
            android release
            
      - name: Upload Production Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sliding-puzzle-release-aab
          path: bin/*.aab
