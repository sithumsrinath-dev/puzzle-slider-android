name: Build Android App with Buildozer Docker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache Buildozer Global Directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Build Android App Bundle via Docker (STABLE PRODUCTION MODE)
        # 1. BUILDOZER_WARN_ON_ROOT=0 මඟින් root අනතුරු ඇඟවීම් සහ [y/n] ප්‍රශ්න මුළුමනින්ම අක්‍රීය කරයි.
        # 2. Container එක සාමාන්‍ය පරිදි root ලෙස ධාවනය වන බැවින් කිසිදු chown දෝෂයක් මතු නොවේ.
        # 3. බිල්ඩ් එකෙන් පසු Runner එකට ගොනු හැසිරවීමට හැකි වනු පිණිස අවසානයේ අවසර (Permissions) නිවැරදි කරනු ලබයි.
        run: |
          docker run --rm \
            -e BUILDOZER_WARN_ON_ROOT=0 \
            -v ${{ github.workspace }}:/home/user/hostdir \
            -v ~/.buildozer:/home/user/.buildozer \
            kivy/buildozer:latest \
            android release

      - name: Fix Workspace Permissions for GitHub Runner
        # Docker එක root ලෙස ධාවනය වූ නිසා නිපදවුණු ගොනුවල අයිතිය නැවත GitHub Runner වෙත පැවරීම
        if: always()
        run: |
          sudo chown -R $USER:$USER ${{ github.workspace }}
          sudo chown -R $USER:$USER ~/.buildozer || true

      - name: Upload Production Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sliding-puzzle-release-aab
          path: bin/*.aab
