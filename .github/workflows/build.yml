name: Build Android App with Buildozer Docker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache Buildozer Global Directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Create Local Buildozer Cache Directory and Fix Permissions
        # Docker එක ඇතුළට යාමට පෙර, බාහිරින් සම්බන්ධ වන ෆෝල්ඩර සාදා ඒවාට Runner ගේ පූර්ණ අවසර ලබා දීම.
        run: |
          mkdir -p .buildozer-global
          chmod -R 777 .buildozer-global
          chmod -R 777 ${{ github.workspace }}

      - name: Build Android App Bundle via User-Spoofed Docker Container
        # 1. --entrypoint "" මඟින් Container එක පණගැන්වීමේදී සිදුවන chown පරීක්ෂාව මුළුමනින්ම මඟහරියි.
        # 2. -u 1000:1000 මඟින් Buildozer හට පද්ධතිය සාමාන්‍ය පරිශීලකයෙකු (Non-root) ලෙස පෙන්වයි. (input() එක ක්‍රියාත්මක නොවේ!)
        # 3. HOME=/tmp මඟින් අභ්‍යන්තර ලොක් වූ root ෆෝල්ඩර භාවිත කිරීම වළක්වා, අවසර ඇති ෆෝල්ඩරයක් ලබා දෙයි.
        run: |
          docker run --rm \
            --entrypoint "" \
            -u 1000:1000 \
            -e HOME=/tmp \
            -v ${{ github.workspace }}:/home/user/hostdir \
            -v ${{ github.workspace }}/.buildozer-global:/tmp/.buildozer \
            kivy/buildozer:latest \
            /bin/bash -c "buildozer android release"

      - name: Upload Production Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ultimate-sliding-puzzle-release
          path: bin/*.aab
