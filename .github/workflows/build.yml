name: Build Puzzle Slider AAB

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          ccache \
          git \
          libffi-dev \
          libssl-dev \
          libgtk-3-dev \
          zlib1g-dev \
          unzip \
          zip \
          autoconf \
          automake \
          libtool \
          libtool-bin \
          gettext \
          pkg-config \
          cmake \
          ninja-build \
          patch

    - name: Install Python Build Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install --upgrade cython virtualenv buildozer kivy

    - name: Prepare Android SDK Command-line Tools
      run: |
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip -d temp_tools
        mv temp_tools/cmdline-tools/* /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/
        rm -rf cmdline-tools.zip temp_tools

    - name: Accept Android SDK Licenses
      run: |
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk/licenses
        echo -e "\n8933bad161af4b78b868bd014aa3664d06aef6cc" > /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fb5" >> /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "\nd56f5187479451eabf01fb78af6dfcb131a6486e" >> /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license

    - name: Build Android App Bundle (AAB) with Buildozer
      run: |
        unset ANDROID_SDK_ROOT
        unset ANDROID_HOME
        unset ANDROID_NDK
        unset ANDROID_NDK_LATEST_HOME
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_ROOT
        
        export HOME=/home/runner
        export BUILDOZER_ALLOW_ORG_TEST_DOMAIN=1
        buildozer android release

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-aab
        path: bin/*.aab
