name: Build Android App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Buildozer inside Docker Container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostdir \
            ghcr.io/kivy/buildozer:master \
            android release

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: puzzle-slider-release
          path: bin/*.aab

      - name: Setup Interactive Live Debug Session on Failure
        if: failure()
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
