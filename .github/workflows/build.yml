name: Build Puzzle Slider AAB

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          ccache \
          git \
          libffi-dev \
          libssl-dev \
          libgtk-3-dev \
          zlib1g-dev \
          openjdk-11-jdk \
          unzip \
          zip \
          autoconf \
          automake \
          libtool \
          libtool-bin \
          gettext \
          pkg-config \
          cmake \
          ninja-build \
          patch

    - name: Install Python Build Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install --upgrade cython virtualenv buildozer kivy

    - name: Setup Android SDK and Build Tools
      run: |
        export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $ANDROID_HOME/cmdline-tools/latest
        
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O /tmp/cmdline-tools.zip
        unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-extract
        cp -r /tmp/cmdline-extract/cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/
        
        mkdir -p $ANDROID_HOME/licenses
        printf "893547e6b492b10e2ea34726a995d8e63b61434d\nd56f5187479451eabf01fb7431302458d34d7756\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n84831b9409646a918e30573bab4c9c91346d8abd\n" > $ANDROID_HOME/licenses/android-sdk-license
        
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "platforms;android-33" "build-tools;33.0.2" "tools"

    - name: Generate Valid Buildozer Spec
      run: |
        rm -f buildozer.spec
        buildozer init
        sed -i 's/# title = My Application/title = Puzzle Slider/g' buildozer.spec
        sed -i 's/# package.name = myapp/package.name = puzzleslider/g' buildozer.spec
        sed -i 's/# package.domain = org.example/package.domain = org.senu/g' buildozer.spec
        sed -i 's/# source.include_exts = py,png,jpg,kv,atlas/source.include_exts = py,png,jpg,kv,atlas/g' buildozer.spec
        sed -i 's/# version = 0.1/version = 1.0/g' buildozer.spec
        sed -i 's/# requirements = python3,kivy/requirements = python3,kivy/g' buildozer.spec
        sed -i 's/# orientation = portrait/orientation = portrait/g' buildozer.spec
        sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/g' buildozer.spec
        sed -i 's/# fullscreen = 0/fullscreen = 1/g' buildozer.spec

    - name: Build Android App Bundle (AAB) with Buildozer
      run: |
        unset ANDROID_NDK
        unset ANDROID_NDK_LATEST_HOME
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_ROOT
        
        export ANDROID_NDK_HOME=$HOME/.buildozer/android/platform/android-ndk-r25b
        export ANDROID_NDK_ROOT=$HOME/.buildozer/android/platform/android-ndk-r25b
        
        buildozer android release

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-aab
        path: bin/*.aab
