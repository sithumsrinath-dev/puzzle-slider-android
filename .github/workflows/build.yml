දෝෂයට හේතුව වනුයේ `buildozer.spec` ගොනුවේ `android.ndk_path` අගය වෙනස් කළද, Buildozer මඟින් ස්වයංක්‍රීයව සකසන අභ්‍යන්තර `.buildozer/` cache ගොනු තුළ පැරණි දූෂිත වින්‍යාසයන් (artifacts) ඉතිරිව පැවතීමයි, එබැවින් ධාවනයට පෙර cache එක පූර්ණ ලෙස පිරිසිදු කර (`buildozer android clean`) නවතම Cython අනුවාදය සහ නිවැරදි SDK බලපත්‍ර ස්ථාපනය ස්ථාපිත කිරීමට `build.yml` ගොනුව පමණක් යාවත්කාලීන කර ඇත.

### .github/workflows/build.yml

```yaml
name: Build Android App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openjdk-17-jdk \
            git \
            zip \
            unzip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            ccache \
            automake \
            make

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install "cython<3.0.0" buildozer virtualenv

      - name: Build Android Release
        env:
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/25.2.9519653
          ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/25.2.9519653
          ANDROIDNDK: /usr/local/lib/android/sdk/ndk/25.2.9519653
        run: |
          export PATH=/usr/local/lib/android/sdk/ndk/25.2.9519653/toolchains/llvm/prebuilt/linux-x64/bin:$PATH
          buildozer android clean
          yes | buildozer -v android release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: bin/*.aab

```
