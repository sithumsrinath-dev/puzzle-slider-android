- name: Build Android App
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostdir \
            -v ${{ github.workspace }}/.buildozer:/home/user/hostdir/.buildozer \
            -e BUILDOZER_ALLOW_ROOT=1 \
            kivy/buildozer:latest \
            /bin/bash -c "cd /home/user/hostdir && yes | buildozer --verbose android clean && yes | buildozer --verbose android release"
