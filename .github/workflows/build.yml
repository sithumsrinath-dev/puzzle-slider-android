name: Build Android App with Buildozer

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ccache git libffi-dev libssl-dev \
            autoconf automake libtool patch pkg-config zlib1g-dev \
            libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            libsqlite3-dev sqlite3 bzip2 libbz2-dev liblzma-dev \
            libreadline-dev libgdbm-dev libdb5.3-dev libpcap-dev unzip openjdk-17-jdk \
            gettext autopoint m4 libtool-bin

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==3.0.10 kivy

      - name: Patch Incompatible Libffi Recipe (ROOT FIX)
        # We find python-for-android's internal source files and swap out the broken 3.4.4 version for 3.4.6, 
        # which fixes the broken macro parsing bug entirely.
        run: |
          P4A_RECIPE_DIR=$(python -c "import os, pythonforandroid as p4a; print(os.path.dirname(p4a.__file__))")/recipes/libffi
          if [ -f "$P4A_RECIPE_DIR/__init__.py" ]; then
            echo "Patching python-for-android libffi recipe version template..."
            sed -i 's/version = "3.4.4"/version = "3.4.6"/g' "$P4A_RECIPE_DIR/__init__.py"
            sed -i 's/version = '\''3.4.4'\''/version = '\''3.4.6'\''/g' "$P4A_RECIPE_DIR/__init__.py"
          else
            echo "Recipe direct file not found where expected, falling back to clean injection..."
          fi

      - name: Configure Android SDK Layout
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
          
          mkdir -p /usr/local/lib/android/sdk/tools/bin
          if [ -f "/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager" ]; then
            ln -sf /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager /usr/local/lib/android/sdk/tools/bin/sdkmanager
          elif [ -f "/usr/local/lib/android/sdk/cmdline-tools/11.0/bin/sdkmanager" ]; then
            ln -sf /usr/local/lib/android/sdk/cmdline-tools/11.0/bin/sdkmanager /usr/local/lib/android/sdk/tools/bin/sdkmanager
          fi
          
          yes | /usr/local/lib/android/sdk/tools/bin/sdkmanager --licenses || true

      - name: Build Android App Bundle (Release AAB)
        run: |
          # Keep global fallbacks active alongside the target template patch
          export ACLOCAL_PATH="/usr/share/aclocal"
          buildozer android release

      - name: Upload Production Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sliding-puzzle-release-aab
          path: bin/*.aab
