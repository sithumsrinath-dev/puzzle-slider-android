name: Build Puzzle Slider AAB

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          ccache \
          git \
          libffi-dev \
          libssl-dev \
          libgtk-3-dev \
          zlib1g-dev \
          openjdk-17-jdk \
          unzip \
          zip \
          autoconf \
          automake \
          libtool \
          libtool-bin \
          gettext \
          pkg-config \
          cmake \
          ninja-build \
          patch

    - name: Install Python Build Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install --upgrade cython virtualenv buildozer kivy

    - name: Pre-Setup Android SDK and Hard Link Paths
      run: |
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/tools/bin
        
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O /tmp/cmdline-tools.zip
        mkdir -p /tmp/cmdline-raw
        unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-raw
        cp -r /tmp/cmdline-raw/cmdline-tools/* $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/
        
        ln -sf $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager$HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
        
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
        printf "893547e6b492b10e2ea34726a995d8e63b61434d\nd56f5187479451eabf01fb7431302458d34d7756\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n84831b9409646a918e30573bab4c9c91346d8abd\n" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        
        yes | $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/.buildozer/android/platform/android-sdk --licenses || true

    - name: Build Android App Bundle (AAB) with Buildozer
      run: |
        if [ -f buildozer.spec ]; then
          sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/g' buildozer.spec
        fi
        
        unset ANDROID_NDK
        unset ANDROID_NDK_LATEST_HOME
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_ROOT
        
        export ANDROID_NDK_HOME=$HOME/.buildozer/android/platform/android-ndk-r25b
        export ANDROID_NDK_ROOT=$HOME/.buildozer/android/platform/android-ndk-r25b
        
        buildozer android release

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-aab
        path: bin/*.aab
