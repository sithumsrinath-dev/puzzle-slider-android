name: Build Android App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/kivy/buildozer:master
      options: --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Declare Safe Git Directory
        run: |
          git config --global --add safe.directory /__w/puzzle-slider-android/puzzle-slider-android
          chown -R user:user .

      - name: Build with Buildozer Container Environment
        run: |
          su user -c "buildozer android release"

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: puzzle-slider-release
          path: bin/*.aab

      - name: Setup Interactive Live Debug Session on Failure
        if: failure()
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
