name: Build Release APK

​on:

push:

branches: [ main ]

​jobs:

build:

runs-on: ubuntu-latest

​steps:

- uses: actions/checkout@v3

​- name: Get Date

# Buildozer cache එක සඳහා දිනය ලබා ගැනීම

run: |

echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

​- name: Cache Buildozer JSONS

uses: actions/cache@v3

with:

path: .buildozer

key: {{ runner.os }}-buildozer-{{ env.date }}

​- name: Build with Buildozer

uses: ArtemGovorov/buildozer-action@v1

id: buildozer

with:

command: buildozer android release

repository_root: .

​- name: Generate Keystore & Sign APK

# මෙතනදී GitHub විසින්ම ස්වයංක්‍රීයව ආරක්ෂිත Key එකක් සාදා ඇප් එක Lock කරයි

run: |

keytool -genkey -v -keystore release.keystore -alias puzzle_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass silentpuzzle123 -keypass silentpuzzle123 -dname "CN=SilentThoughts, O=App, L=Colombo, C=LK"

jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 -keystore release.keystore -storepass silentpuzzle123 bin/*.apk puzzle_alias

​- name: Upload APK Artifact

uses: actions/upload-artifact@v3

with:

name: Ultimate-Sliding-Puzzle-Release

path: bin/*.apk
