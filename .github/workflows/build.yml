name: Build Android App with Buildozer Docker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache Buildozer Global Directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Build Android App Bundle via Docker Container
        # 1. --entrypoint "" මඟින් Image එක ඇතුළේ ඇති අවසර (Permission) පරීක්ෂා කරන කේත මඟහරියි.
        # 2. env BUILDOZER_WARN_ON_ROOT=0 මඟින් [y/n] ප්‍රශ්න ඇසීම මුළුමනින්ම නවත්වයි.
        # 3. buildozer android release මඟින් කෙලින්ම AAB ගොනුව නිෂ්පාදනය කරයි.
        run: |
          docker run --rm \
            --entrypoint "" \
            -v ${{ github.workspace }}:/home/user/hostdir \
            -v ~/.buildozer:/home/user/.buildozer \
            kivy/buildozer:latest \
            /bin/bash -c "env BUILDOZER_WARN_ON_ROOT=0 buildozer android release"

      - name: Fix Workspace Permissions for GitHub Actions Artifacts
        # Docker එක root ලෙස දිවීම නිසා ලොක් වූ ගොනුවල අයිතිය නැවත GitHub Runner වෙත පැවරීම
        if: always()
        run: |
          sudo chown -R $USER:$USER ${{ github.workspace }}
          sudo chown -R $USER:$USER ~/.buildozer || true

      - name: Upload Production Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ultimate-sliding-puzzle-release
          path: bin/*.aab
