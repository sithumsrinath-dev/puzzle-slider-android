name: Build Android App with Buildozer

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ccache git libffi-dev libssl-dev \
            autoconf automake libtool pkg-config zlib1g-dev \
            libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            libsqlite3-dev sqlite3 bzip2 libbz2-dev liblzma-dev \
            libreadline-dev libgdbm-dev libdb5.3-dev libpcap-dev unzip openjdk-17-jdk

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==3.0.10 kivy

      - name: Fix Android SDK Layout for Buildozer (CRITICAL STEP)
        # Buildozer සොයන පැරණි tools/bin මාර්ගය සාදා එය නව cmdline-tools වෙත ලින්ක් කිරීම
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
          
          # Buildozer රවටා ගැනීමට අවශ්‍ය tools/bin ෆෝල්ඩරය කෘතිමව සෑදීම
          mkdir -p /usr/local/lib/android/sdk/tools/bin
          
          # පද්ධතියේ පවතින සැබෑ sdkmanager එක, Buildozer සොයන තැනට ලින්ක් (Symlink) කිරීම
          if [ -f "/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager" ]; then
            ln -sf /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager /usr/local/lib/android/sdk/tools/bin/sdkmanager
          elif [ -f "/usr/local/lib/android/sdk/cmdline-tools/11.0/bin/sdkmanager" ]; then
            ln -sf /usr/local/lib/android/sdk/cmdline-tools/11.0/bin/sdkmanager /usr/local/lib/android/sdk/tools/bin/sdkmanager
          fi
          
          # සියලුම බලපත්‍ර (Licenses) ස්වයංක්‍රීයව පිළිගැනීම
          yes | /usr/local/lib/android/sdk/tools/bin/sdkmanager --licenses || true

      - name: Build Android App Bundle (Release AAB)
        run: |
          # මෙවර Buildozer එකට tools/bin/sdkmanager එක 100%ක්ම හමුවන නිසා සාර්ථකව build වේ
          buildozer android release

      - name: Upload Production Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sliding-puzzle-release-aab
          path: bin/*.aab
