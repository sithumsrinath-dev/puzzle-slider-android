name: Build Ultimate Sliding Puzzle APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK with Buildozer Action
        uses: subosito/buildozer-action@v1
        with:
          command: buildozer -v android debug
          repository_root: .
