name: Android Build Error Diagnostic Mode

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential ccache git libffi-dev libssl-dev \
          libltdl-dev libgstreamer1.0-dev gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
          gstreamer1.0-plugins-ugly gstreamer1.0-libav gstreamer1.0-doc \
          libgstreamer-plugins-base1.0-dev unzip zip openjdk-17-jdk \
          autoconf libtool pkg-config zlib1g-dev python3-setuptools \
          python3-pip python3-dev libncurses5-dev libsqlite3-dev libgdbm-dev libbz2-dev \
          libjpeg-dev zlib1g-dev appstream autotools-dev

    - name: Run Buildozer with Full Debug Logging
      run: |
        python -m venv venv
        source venv/bin/activate
        pip install --upgrade pip
        pip install --upgrade Cython==3.0.10 "buildozer>=1.5.0" virtualenv setuptools wheel
        
        # 👑 [පද්ධතියෙන්ම හේතුව ඇසීම]
        # මෙහි log_level=2 දමා ඇති නිසා සිදුවන හැම සියුම් දේම පෙන්වයි.
        # තවද '|| true' දමා ඇති නිසා බිල්ඩ් එක Fail වුණත් සර්වර් එක එතනින්ම නවතින්නේ නැතුව Error එක පෙන්වනවා.
        buildozer android debug --verbose || true
        
        echo "========================================================="
        echo "❌❌ බිල්ඩ් එක නතර වීමට හේතුව (Actual Error Log) පහතින් බලන්න: ❌❌"
        echo "========================================================="
        
        # බිල්ඩ් එක කැඩෙන්න හේතු වුණු අවසන් පේළි 100 Terminal එකට ගෙන්වා ගැනීම
        tail -n 100 ~/.buildozer/buildozer.log || echo "Buildozer log file not found."
