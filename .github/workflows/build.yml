name: Build Android App with Buildozer Docker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache Buildozer Global Directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Build Android App Bundle via Docker (FULLY AUTOMATED UNATTENDED MODE)
        # 1. -i (Interactive) සහ --entrypoint මඟින් Input Pipe එක කෙලින්ම Docker අභ්‍යන්තරයට සම්බන්ධ කරයි.
        # 2. --user මඟින් root පරිශීලකයා වෙනුවට වත්මන් GitHub Runner පරිශීලකයාගේ හැඳුනුම් අංකය (UID/GID) ආදේශ කරයි.
        # 3. මින් ඉදිරියට කිසිදු Root Error එකක් හෝ EOFError එකක් හට නොගනී.
        run: |
          mkdir -p .buildozer-global
          yes y | docker run -i --rm \
            -u "$(id -u):$(id -g)" \
            -v ${{ github.workspace }}:/home/user/hostdir \
            -v ${{ github.workspace }}/.buildozer-global:/home/user/.buildozer \
            kivy/buildozer:latest \
            android release
            
      - name: Upload Production Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sliding-puzzle-release-aab
          path: bin/*.aab
