name: Production Android Build (Keep-Alive & Export Grade)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04  # වඩාත් ස්ථාවර සහ Android බිල්ඩ් සඳහා හොඳින්ම ගැළපෙන පද්ධතිය
    timeout-minutes: 120

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential ccache git libffi-dev libssl-dev \
          libltdl-dev libgstreamer1.0-dev gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
          gstreamer1.0-plugins-ugly gstreamer1.0-libav gstreamer1.0-doc \
          libgstreamer-plugins-base1.0-dev unzip zip openjdk-17-jdk \
          autoconf libtool pkg-config zlib1g-dev python3-setuptools \
          python3-pip python3-dev libncurses5-dev libsqlite3-dev libgdbm-dev libbz2-dev \
          libjpeg-dev zlib1g-dev appstream autotools-dev

    - name: Build Android App inside Virtual Environment
      run: |
        # 1. ස්වාධීන Python Virtual Environment එකක් සකසා ගැනීම
        python -m venv venv
        source venv/bin/activate
        
        # 2. අවශ්‍ය මෙවලම් පද්ධතිය ස්ථාපනය කිරීම
        pip install --upgrade pip
        pip install --upgrade Cython==3.0.10 "buildozer>=1.5.0" virtualenv setuptools wheel
        
        # 3. GitHub Actions සර්වර් එකේ පරිසර විචල්‍යයන් නිවැරදිව පෙන්වීම
        export ANDROID_HOME=$ANDROID_HOME_ROOT
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
        
        # 4. පද්ධතියේ ඇති Android SDK බලපත්‍ර පිළිගැනීම
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        yes | sdkmanager --licenses || true
        
        # 5. පසුබිම් Keep-Alive සංඥාව සක්‍රීය කිරීම
        bash -c 'while true; do echo "⏳ [Keep-Alive] සර්වර් එක සක්‍රීයයි... බිල්ඩ් එක සිදුවෙමින් පවතිනවා..."; sleep 30; done' &
        KEEP_ALIVE_PID=$!        
        
        # 6. පැරණි කැඩුණු Cache ඉවත් කර බිල්ඩ් එක පිරිසිදු කිරීම
        buildozer android clean || true
        
        # 👑 [EXIT CODE 100 සඳහා වන අවසන් මහා විසඳුම] 👑
        # බිල්ඩ් එක සිදුවන අතරතුර Buildozer විසින් අලුතින් සාදන සියලුම Android SDK බලපත්‍ර 
        # 'yes |' විධානය මඟින් ස්වයංක්‍රීයවම (Non-interactive) පිළිගැනීමට සලස්වා ඇත.
        
        # පළමුව Play Store සඳහා .aab එක නිපදවීම
        sed -i 's/android.release_artifact = apk/android.release_artifact = aab/g' buildozer.spec
        yes | buildozer android release
        
        # දෙවණුව ජංගම දුරකථනයට දැමීමට .apk එක නිපදවීම
        sed -i 's/android.release_artifact = aab/android.release_artifact = apk/g' buildozer.spec
        yes | buildozer android debug
        
        # 7. Keep-Alive ක්‍රියාවලිය නතර කිරීම
        kill $KEEP_ALIVE_PID
      continue-on-error: false

    - name: Upload Production AAB (For Google Play Store)
      uses: actions/upload-artifact@v4
      with:
        name: Play-Store-Production-Bundle-AAB
        path: bin/*.aab

    - name: Upload Testing APK (For your Mobile Phone)
      uses: actions/upload-artifact@v4
      with:
        name: Testing-App-APK
        path: bin/*.apk
