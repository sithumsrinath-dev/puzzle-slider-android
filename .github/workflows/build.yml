name: Build Ultimate Sliding Puzzle APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libsqlite3-dev libgdbm-dev libssl-dev libbz2-dev libffi-dev zlib1g-dev
          pip3 install --user --upgrade buildozer cython virtualenv

      - name: Pre-Install Android SDK and Create Symlink Bridge
        run: |
          # 1. Setup SDK folder structure
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
          cd ~/.buildozer/android/platform/android-sdk/cmdline-tools
          
          # 2. Download official Android Commandline Tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip cmdline-tools.zip
          mv cmdline-tools latest
          
          # 3. Create the tools bridge for Buildozer compatibility
          cd ~/.buildozer/android/platform/android-sdk
          ln -s cmdline-tools/latest tools
          
          # 4. Set environment paths and forcefully accept licenses
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          
          echo "yes" | yes | ./cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build APK with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin
          buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ultimate-Sliding-Puzzle-APK
          path: bin/*.apk
